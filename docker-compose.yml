services:
  chaoxing-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: chaoxing-webui
    restart: unless-stopped
    environment:
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env}
      ALLOW_PUBLIC_REGISTER: ${ALLOW_PUBLIC_REGISTER:-true}
      CORS_ALLOW_ORIGIN: ${CORS_ALLOW_ORIGIN:-}
      TRUST_PROXY: ${TRUST_PROXY:-true}
      RATE_LIMIT_ENABLED: ${RATE_LIMIT_ENABLED:-true}
      MAX_ACTIVE_TASKS_PER_USER: ${MAX_ACTIVE_TASKS_PER_USER:-2}
      MAX_CONTENT_LENGTH: ${MAX_CONTENT_LENGTH:-65536}
      APP_DB_FILE: /app/runtime/backend_app.db
      INVITE_CODE_FILE: /app/runtime/invite_codes.json
      MODULE_RECORD_DIR: /app/runtime/module_records
      RUNTIME_DIR: /app/runtime
      COOKIES_PATH: /app/runtime/cookies.txt
      CHAOXING_LOG_FILE: /app/runtime/chaoxing.log
      AI_CONFIG_FILE: /app/runtime/ai_config.json
      AI_API_ENDPOINT: ${AI_API_ENDPOINT:-https://api.openai.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_API_MODEL: ${AI_API_MODEL:-gpt-4o-mini}
      PORT: 8000
    ports:
      - "127.0.0.1:18000:8000"
    volumes:
      - ./runtime:/app/runtime
    tmpfs:
      - /tmp:size=128m,mode=1777
      - /app/tmp:size=64m,mode=1777
    read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 768m
    cpus: 1.5
