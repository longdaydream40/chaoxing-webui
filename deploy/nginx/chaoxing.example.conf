server {
    listen 80;
    listen [::]:80;
    server_name example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name example.com;

    ssl_certificate /etc/nginx/ssl/example.com/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    client_max_body_size 50m;


    # Deny direct access to backend/runtime/deployment-looking paths; SPA fallback must not mask these.
    location ~ ^/(backend|runtime|security-archive)(/|$) {
        return 404;
    }

    location ~ ^/(\.env|docker-compose\.ya?ml|Dockerfile.*|.*\.db|.*\.log|cookies\.txt|invite_codes\.json|ai_config\.json|cache\.json|config\.ini|.*\.bak.*)$ {
        return 404;
    }


    location = /admin.html {
        return 404;
    }

    location = /admin {
        root /srv/chaoxing/frontend;
        default_type text/html;
        add_header Cache-Control "no-store" always;
        try_files /admin.html =404;
    }

    location = /config.js {
        default_type application/javascript;
        add_header Cache-Control "no-store" always;
        return 200 'window.APP_CONFIG = { API_BASE_URL: "" };\n';
    }

    location ^~ /api/ {
        proxy_pass http://127.0.0.1:18000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    location / {
        root /srv/chaoxing/frontend;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}
